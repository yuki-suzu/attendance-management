debug: false
server:
  port: ${SERVER_PORT:8081}
spring:
  application:
    name: attendance-service
  config:
    import: file:../infra/env/.env[.properties]
  jackson:
    property-naming-strategy: SNAKE_CASE
  # ===================================================
  # データソース & HikariCP設定
  # ===================================================
  datasource:
    # ローカル（IDEからの起動時）は、SpringがDocker Composeを検知してこの値を「自動で上書き」して繋ぐ
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:attendance_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari:
      # プール内の最大コネクション数
      maximum-pool-size: 10
      # 常に保持しておく最低限の待機コネクション数
      minimum-idle: 2
      # コネクション取得のタイムアウト時間（ミリ秒：デフォルト30秒）
      connection-timeout: 30000
      # コネクションの最大生存時間（ミリ秒：デフォルト30分）※DB側の切断設定より短くするのが鉄則！
      max-lifetime: 1800000
  # ===================================================
  # インフラツール設定 (Flyway / jOOQ)
  # ===================================================
  flyway:
    # 本番環境では勝手に流さない（CI/CDで制御する）
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    baseline-on-migrate: true
  jooq:
    sql-dialect: postgres
# ===================================================
# 外部API連携設定 (Hrmos / LINE WORKS)
# ===================================================
app:
  hrmos:
    api:
      company-url: ${HRMOS_COMPANY_URL} # 環境変数から取得
      secret-key: ${HRMOS_SECRET_KEY}   # 環境変数から取得
      base-url: ${HRMOS_BASE_URL:}api/${app.hrmos.api.company-url}${HRMOS_API_VERSION:/v1}
  line-works:
    base-url: ${LW_BASE_URL:}
    client-id: ${LW_CLIENT_ID:}
    client-secret: ${LW_CLIENT_SECRET:}
    service-account: ${LW_SERVICE_ACCOUNT:}
    private-key: ${LW_PRIVATE_KEY_PATH:}
    bot-id: ${LW_BOT_ID:}
    alert-channel-id: ${LW_ALERT_CHANNEL_ID:}
  batch:
    # 環境変数 ALERT_CRON が設定されていればそれを使い、無ければデフォルト(毎朝9:30)を使う
    alert-cron: ${ALERT_CRON:0 30 9 * * ?}

# ===================================================
# API仕様書
# ===================================================
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

logging:
  level:
    # 自身のパッケージ配下のみ DEBUG レベルを出力する
    com.computer_rescuer.attendance_management: DEBUG