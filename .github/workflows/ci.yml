name: Spring Boot CI Pipeline

# どのタイミングでこの自動化を動かすか
on:
  push:
    branches: [ "main", "develop" ] # mainやdevelopブランチにPushされた時
  pull_request:
    branches: [ "main", "develop" ] # PRが作られた時

jobs:
  build-and-test:
    runs-on: ubuntu-latest # GitHubが用意してくれる無料のLinuxサーバー

    steps:
      # 1. GitHubのリポジトリからコードをダウンロードする
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Java 25 の環境をセットアップする
      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin' # Adoptium(Temurin)を使用

      # 3. Gradleのキャッシュを有効化（2回目以降のビルドが爆速になります）
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 4. 実行権限を付与して、Gradleでビルド＆テストを実行！
      # （ここでH2でのFlyway実行 → jOOQ生成 → 単体テスト → E2Eテスト が全自動で走ります）
      - name: Build and Test
        run: |
          chmod +x gradlew
          ./gradlew build
